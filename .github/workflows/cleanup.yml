name: Delete false outage data

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete false "down" rows from gRPC bug era
        run: |
          echo "Deleting false rows from 2026-07-19T05:11Z to 2026-07-22T00:37Z..."

          # Delete the rows (use Z suffix to avoid URL-encoding issues with +00:00)
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X DELETE \
            "${SUPABASE_URL}/rest/v1/check_results?checked_at=gte.2026-07-19T05:11:00Z&checked_at=lt.2026-07-22T00:37:00Z" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Prefer: return=representation")

          HTTP_CODE=$(echo "$RESP" | tail -1 | sed 's/HTTP_STATUS://')
          BODY=$(echo "$RESP" | sed '$d')

          echo "Delete response HTTP: $HTTP_CODE"
          echo "Deleted rows: $(echo "$BODY" | python3 -c 'import sys,json; data=json.load(sys.stdin); print(len(data))' 2>/dev/null || echo 'unknown')"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Response body: $BODY"
            exit 1
          fi
          echo "Done."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
