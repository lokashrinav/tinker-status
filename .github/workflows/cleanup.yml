name: Delete false outage data

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete false rows from gRPC era
        run: |
          # Delete all "down" rows from after the HTTP fix was deployed
          # (these were caused by gRPC hanging while HTTP was fine)
          echo "Deleting false 'down' rows from 2026-07-22T00:37Z to 2026-07-22T04:33Z..."

          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X DELETE \
            "${SUPABASE_URL}/rest/v1/check_results?checked_at=gte.2026-07-22T00:37:00Z&checked_at=lt.2026-07-22T04:33:00Z&status=eq.down" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Prefer: return=representation")

          HTTP_CODE=$(echo "$RESP" | tail -1 | sed 's/HTTP_STATUS://')
          BODY=$(echo "$RESP" | sed '$d')

          echo "HTTP: $HTTP_CODE"
          echo "Deleted: $(echo "$BODY" | python3 -c 'import sys,json; data=json.load(sys.stdin); print(len(data))' 2>/dev/null || echo 'unknown') rows"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: $BODY"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
