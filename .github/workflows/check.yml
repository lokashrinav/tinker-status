name: Tinker Health Check

# workflow_dispatch: manual runs + optional external HTTP cron (see README).
# schedule: baseline so checks still run if external cron fails (GitHub may delay/skip
# scheduled jobs under load; external cron is still a good second path).
on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python check.py
        env:
          TINKER_API_KEY: ${{ secrets.TINKER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
