name: Tinker Health Check

# Runs are triggered by workflow_dispatch only. GitHub's schedule cron is unreliable on
# free tier (delays/skips). Use an external HTTP cron (e.g. cron-job.org) POSTing to the
# dispatch API — see README "Scheduling".
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python check.py
        env:
          TINKER_API_KEY: ${{ secrets.TINKER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
