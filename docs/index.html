<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinker Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-2: #555;
    --text-3: #999;
    --border: #e8e8e8;
    --green: #2da44e;
    --red: #cf222e;
    --yellow: #bf8700;
    --hover: #fafafa;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 24px 100px;
  }

  /* ── Header ── */
  header { margin-bottom: 64px; }

  h1 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .overall {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .overall .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
  }

  .overall .dot.degraded { background: var(--yellow); }
  .overall .dot.down { background: var(--red); }

  /* ── Services ── */
  .services { margin-bottom: 64px; }

  .service {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
  }

  .service:first-child { border-top: 1px solid var(--border); }

  .service-name {
    font-size: 0.92rem;
    font-weight: 500;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--text-2);
  }

  .status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  .status.up { color: var(--green); }
  .status.up .dot { background: var(--green); }
  .status.down { color: var(--red); }
  .status.down .dot { background: var(--red); }

  /* ── Timeline ── */
  .timeline-section { margin-bottom: 64px; }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
  }

  .section-sub {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
  }

  .tl-row { margin-bottom: 24px; }

  .tl-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .tl-name { font-size: 0.82rem; font-weight: 500; }

  .tl-pct {
    font-family: var(--mono);
    font-size: 0.78rem;
  }

  .tl-pct.good { color: var(--green); }
  .tl-pct.warn { color: var(--yellow); }
  .tl-pct.bad { color: var(--red); }

  .tl-bar {
    display: flex;
    gap: 1.5px;
    height: 24px;
  }

  .tl-bar .t {
    flex: 1;
    border-radius: 2px;
    transition: opacity 0.15s;
  }

  .tl-bar .t.up { background: var(--green); opacity: 0.35; }
  .tl-bar .t.up:hover { opacity: 0.7; }
  .tl-bar .t.down { background: var(--red); opacity: 0.7; }
  .tl-bar .t.down:hover { opacity: 1; }
  .tl-bar .t.empty { background: #f0f0f0; }

  .tl-range {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-3);
  }

  /* ── Incidents ── */
  .incidents-section { margin-bottom: 0; }

  .incident {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }

  .incident:first-child { border-top: 1px solid var(--border); }

  .incident-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    position: relative;
    top: 2px;
  }

  .incident-body { flex: 1; min-width: 0; }

  .incident-svc { font-weight: 500; }

  .incident-err {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .incident-time {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .no-incidents {
    padding: 28px 0;
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-3);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* ── Footer ── */
  footer {
    margin-top: 56px;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-3);
  }

  /* ── Loading ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 120px 0;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-3);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-top-color: var(--text-3);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .container { padding: 48px 20px 64px; }
    h1 { font-size: 1.6rem; }
    .service { flex-wrap: wrap; gap: 8px; }
    .incident { flex-wrap: wrap; }
    footer { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>

<div class="container">
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      fetching status
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fbtndmrbruifjdeaydjh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidG5kbXJicnVpZmpkZWF5ZGpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODQzOTUsImV4cCI6MjA5MTg2MDM5NX0.n2tlq1Vbq4RqVKVHLHCY_OykV5Sq3bCP_GOxrUKHvu8';

const SERVICES = [
  { key: 'reachability', name: 'API' },
  { key: 'sampling', name: 'Inference' },
  { key: 'openai_compatible', name: 'OpenAI-Compatible API' },
  { key: 'training_infra', name: 'Training' },
];

const TICKS = 72;

async function query(path) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  return r.json();
}

async function fetchLatest() {
  const rows = await query('check_results?order=checked_at.desc,service&limit=100');
  const m = {};
  for (const r of rows) { if (!m[r.service]) m[r.service] = r; }
  return m;
}

async function fetchHistory() {
  const since = new Date(Date.now() - 24*3600*1000).toISOString();
  return query(`check_results?checked_at=gte.${since}&order=checked_at.asc&select=service,status,latency_ms,checked_at`);
}

async function fetchIncidents() {
  const since = new Date(Date.now() - 24*3600*1000).toISOString();
  return query(`check_results?status=eq.down&checked_at=gte.${since}&order=checked_at.desc&limit=20&select=service,error,checked_at`);
}

function ticks(hist, key) {
  const rows = hist.filter(r => r.service === key);
  if (!rows.length) return Array(TICKS).fill('empty');
  const now = Date.now(), start = now - 24*3600*1000, bkt = (now - start) / TICKS;
  const t = Array(TICKS).fill('empty');
  for (const r of rows) {
    const i = Math.min(Math.floor((new Date(r.checked_at).getTime() - start) / bkt), TICKS - 1);
    if (i < 0) continue;
    if (t[i] === 'empty' || r.status === 'down') t[i] = r.status;
  }
  return t;
}

function uptime(hist, key) {
  const rows = hist.filter(r => r.service === key);
  if (!rows.length) return null;
  return ((rows.filter(r => r.status === 'up').length / rows.length) * 100).toFixed(2);
}

function pctCls(p) { return p === null ? '' : p >= 99.5 ? 'good' : p >= 95 ? 'warn' : 'bad'; }

function ago(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function statusLabel(st) { return st === 'up' ? 'Operational' : 'Outage'; }

function render(latest, hist, inc) {
  const sts = SERVICES.map(s => latest[s.key]?.status);
  const allUp = sts.every(s => s === 'up');
  const allDown = sts.every(s => s === 'down' || !s);
  const oTxt = allUp ? 'All systems operational' : allDown ? 'Major outage' : 'Experiencing issues';
  const oCls = allUp ? '' : allDown ? 'down' : 'degraded';

  document.getElementById('app').innerHTML = `
    <header>
      <h1>Tinker Status</h1>
      <div class="overall"><div class="dot ${oCls}"></div>${oTxt}</div>
    </header>

    <div class="services">
      ${SERVICES.map(s => {
        const d = latest[s.key], st = d?.status || 'down';
        return `<div class="service">
          <div class="service-name">${s.name}</div>
          <span class="status ${st}"><span class="dot"></span>${statusLabel(st)}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="timeline-section">
      <div class="section-head">
        <div class="section-title">Last 24 hours</div>
        <div class="section-sub">Updated every 10 min</div>
      </div>
      ${SERVICES.map(s => {
        const tk = ticks(hist, s.key), u = uptime(hist, s.key);
        return `<div class="tl-row">
          <div class="tl-label">
            <span class="tl-name">${s.name}</span>
            <span class="tl-pct ${pctCls(u)}">${u !== null ? u + '%' : 'No data'}</span>
          </div>
          <div class="tl-bar">${tk.map(t => `<div class="t ${t}"></div>`).join('')}</div>
        </div>`;
      }).join('')}
      <div class="tl-range"><span>24h ago</span><span>now</span></div>
    </div>

    <div class="incidents-section">
      <div class="section-head">
        <div class="section-title">Recent incidents</div>
        <div class="section-sub">Last 24 hours</div>
      </div>
      ${inc.length === 0
        ? '<div class="no-incidents">No incidents in the last 24 hours.</div>'
        : inc.map(i => {
            const svc = SERVICES.find(s => s.key === i.service);
            return `<div class="incident">
              <div class="incident-dot"></div>
              <div class="incident-body">
                <div class="incident-svc">${svc?.name || i.service}</div>
                <div class="incident-err">${i.error || 'Unknown error'}</div>
              </div>
              <div class="incident-time">${ago(i.checked_at)}</div>
            </div>`;
          }).join('')
      }
    </div>

    <footer>
      <span>Last checked ${latest[SERVICES[0].key]?.checked_at
        ? new Date(latest[SERVICES[0].key].checked_at).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
        : '\u2014'}</span>
    </footer>`;
}

async function load() {
  try {
    const [l, h, i] = await Promise.all([fetchLatest(), fetchHistory(), fetchIncidents()]);
    render(l, h, i);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

load();
setInterval(load, 60000);
</script>
<script data-goatcounter="https://lokashrinav.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
