<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000" media="(max-width: 600px)">
<meta name="theme-color" content="#ffffff" media="(min-width: 601px)">
<title>Tinker Status - Uptime Monitor for Tinker API by Thinking Machines Lab</title>
<meta name="description" content="Independent uptime monitor for the Tinker training API by Thinking Machines Lab. Tracks API reachability, inference, OpenAI-compatible endpoint, and training infrastructure status.">
<meta property="og:title" content="Tinker Status">
<meta property="og:description" content="Is Tinker down? Independent uptime and status page for the Tinker ML training API.">
<meta property="og:url" content="https://lokashrinav.github.io/tinker-status/">
<meta property="og:type" content="website">
<meta name="keywords" content="Tinker, Thinking Machines Lab, Tinker API, Tinker status, Tinker uptime, Tinker down, ML training API status">

<link rel="shortcut icon" href="./favicon.svg">

<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-2: #555;
    --text-3: #999;
    --border: #e8e8e8;
    --green: #2da44e;
    --red: #cf222e;
    --yellow: #bf8700;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    overflow-x: hidden;
    max-width: 100%;
    background: var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    max-width: 100%;
    position: relative;
  }

  /* Clip decorative SVG so it cannot widen the document (mobile horizontal scroll). */
  .ink-blob-wrap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    max-width: 100vw;
    height: min(360px, 50vh);
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .ink-blob {
    position: absolute;
    top: -550px;
    left: -550px;
    width: 1100px;
    height: 1100px;
    pointer-events: none;
    opacity: 0;
    transition: none;
  }

  .ink-blob.visible { opacity: 1; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 80px 24px 100px;
  }

  header { margin-bottom: 64px; }

  h1 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .overall {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .overall .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
  }
  .overall .dot.degraded { background: var(--yellow); }
  .overall .dot.down { background: var(--red); }

  .overall .ts {
    margin-left: auto;
    color: var(--text-3);
  }

  /* ── Services ── */
  .services { margin-bottom: 64px; }

  .service {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
  }
  .service:first-child { border-top: 1px solid var(--border); }

  .service-name { font-size: 0.92rem; font-weight: 500; }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
  }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; }
  .status.up { color: var(--green); }
  .status.up .dot { background: var(--green); }
  .status.down { color: var(--red); }
  .status.down .dot { background: var(--red); }

  /* ── Section headers ── */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
  }

  .section-sub {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
  }

  /* ── Uptime table ── */
  .uptime-section { margin-bottom: 64px; }

  .uptime-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  .uptime-table th {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--text-3);
    text-align: right;
    padding: 0 0 10px 16px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .uptime-table th:first-child { text-align: left; padding-left: 0; }

  .uptime-table td {
    padding: 12px 0 12px 16px;
    text-align: right;
    font-family: var(--mono);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  .uptime-table td:first-child {
    text-align: left;
    font-family: var(--sans);
    font-weight: 500;
    padding-left: 0;
  }

  .uptime-table .good { color: var(--green); }
  .uptime-table .warn { color: var(--yellow); }
  .uptime-table .bad { color: var(--red); }
  .uptime-table .na { color: var(--text-3); }

  /* ── Uptime bar ── */
  .bar-section { margin-bottom: 64px; }

  .bar-row { margin-bottom: 20px; }

  .bar-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .bar-name { font-size: 0.82rem; font-weight: 500; }

  .bar-pct { font-family: var(--mono); font-size: 0.78rem; }
  .bar-pct.good { color: var(--green); }
  .bar-pct.warn { color: var(--yellow); }
  .bar-pct.bad { color: var(--red); }

  .bar {
    display: flex;
    gap: 0;
    height: 24px;
  }

  .bar .t {
    flex: 1;
    min-width: 0;
    border-radius: 0;
    transition: opacity 0.15s;
  }
  .bar .t:first-child { border-radius: 3px 0 0 3px; }
  .bar .t:last-child { border-radius: 0 3px 3px 0; }
  .bar .t.up { background: var(--green); opacity: 0.35; }
  .bar .t.up:hover { opacity: 0.7; }
  .bar .t.down { background: var(--red); opacity: 0.7; }
  .bar .t.down:hover { opacity: 1; }
  .bar .t.empty { background: var(--green); opacity: 0.08; }

  .bar-range {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-3);
  }

  /* ── Latency table ── */
  .latency-section { margin-bottom: 64px; }

  .latency-note {
    font-size: 0.75rem;
    color: var(--text-3);
    margin-top: -12px;
    margin-bottom: 20px;
  }

  /* ── Incidents ── */
  .incidents-section { margin-bottom: 0; }

  .incident {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .incident:first-child { border-top: 1px solid var(--border); }

  .incident-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    position: relative;
    top: 2px;
  }

  .incident-body { flex: 1; min-width: 0; }
  .incident-svc { font-weight: 500; }

  .incident-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
  }

  .incident-err {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .incident-time {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .no-incidents {
    padding: 28px 0;
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-3);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  footer {
    margin-top: 56px;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-3);
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 120px 0;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-3);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-top-color: var(--text-3);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── Window tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
  }

  .tab {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-3);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:first-child { border-radius: 6px 0 0 6px; }
  .tab:last-child { border-radius: 0 6px 6px 0; }
  .tab + .tab { border-left: none; }

  .tab.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .tab:hover:not(.active) { color: var(--text); }

  @media (max-width: 600px) {
    body::before {
      content: '';
      display: block;
      position: fixed;
      top: -100vh;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #000;
      z-index: 9999;
      pointer-events: none;
    }
    .service { flex-wrap: wrap; gap: 8px; }
    .service-name { min-width: 0; overflow-wrap: anywhere; }
    .uptime-table { font-size: 0.75rem; table-layout: fixed; }
    .uptime-table th, .uptime-table td { padding-left: 10px; word-break: break-word; }
    .incident { flex-wrap: wrap; }
    .overall { flex-wrap: wrap; }
    .tabs { flex-wrap: wrap; row-gap: 8px; }
  }
</style>
</head>
<body>

<div class="ink-blob-wrap" aria-hidden="true">

<div class="container">
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      fetching status
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://fbtndmrbruifjdeaydjh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidG5kbXJicnVpZmpkZWF5ZGpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODQzOTUsImV4cCI6MjA5MTg2MDM5NX0.n2tlq1Vbq4RqVKVHLHCY_OykV5Sq3bCP_GOxrUKHvu8';

const SVCS = [
  { key: 'reachability', name: 'API' },
  { key: 'sampling', name: 'Inference' },
  { key: 'openai_compatible', name: 'OpenAI-Compatible API' },
  { key: 'training_infra', name: 'Training' },
];

const WINDOWS = [
  { key: '24h', label: '24h', hours: 24 },
  { key: '7d',  label: '7d',  hours: 168 },
  { key: '30d', label: '30d', hours: 720 },
  { key: '90d', label: '90d', hours: 2160 },
];

/* Must match your external cron cadence (minutes between checks). */
const CHECK_INTERVAL_MIN = 10;
/* Merge gap for incidents — two consecutive failures farther apart than this
   are treated as separate incidents.  Set to ~2.5× the cron interval so a
   single skipped run doesn't split one outage into two. */
const INCIDENT_MERGE_MS = CHECK_INTERVAL_MIN * 2.5 * 60 * 1000;
let allData = null;
let activeWindow = '24h';

async function fetchSummary() {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/get_status_summary`, {
    method: 'POST',
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ check_interval_min: CHECK_INTERVAL_MIN }),
  });
  return r.json();
}

function pctStr(p) { return p === null ? '\u2014' : p.toFixed(2) + '%'; }
function pctCls(p) { return p === null ? 'na' : p >= 99.5 ? 'good' : p >= 95 ? 'warn' : 'bad'; }

function fmtMs(ms) {
  if (ms === null || ms === undefined) return '\u2014';
  if (ms < 1000) return Math.round(ms) + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}

function buildIncidents(downRows) {
  const incidents = [];
  let current = null;
  for (const r of downRows) {
    const t = new Date(r.checked_at).getTime();
    if (current && current.service === r.service && t - current.lastSeen < INCIDENT_MERGE_MS) {
      current.lastSeen = t;
      current.count++;
    } else {
      if (current) incidents.push(current);
      current = { service: r.service, error: r.error, start: t, lastSeen: t, count: 1 };
    }
  }
  if (current) incidents.push(current);
  return incidents.reverse();
}

function fmtDuration(ms) {
  const m = Math.round(ms / 60000);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function render() {
  if (!allData) return;
  const { ticks, uptime, latency, latest, incidents: rawIncidents } = allData;
  const win = WINDOWS.find(w => w.key === activeWindow);

  const sts = SVCS.map(s => latest[s.key]?.status);
  const allUp = sts.every(s => s === 'up');
  const allDown = sts.every(s => s === 'down' || !s);
  const oTxt = allUp ? 'All systems operational' : allDown ? 'Major outage' : 'Experiencing issues';
  const oCls = allUp ? '' : allDown ? 'down' : 'degraded';

  const lastCheck = latest[SVCS[0].key]?.checked_at;
  const lastStr = lastCheck ? fmtTime(lastCheck) : '\u2014';

  const incidents = buildIncidents(rawIncidents);

  document.getElementById('app').innerHTML = `
    <header>
      <h1>Tinker Status</h1>
      <div class="overall">
        <div class="dot ${oCls}"></div>${oTxt}
        <span class="ts">Last checked ${lastStr}</span>
      </div>
    </header>

    <div class="services">
      ${SVCS.map(s => {
        const d = latest[s.key], st = d?.status || 'down';
        return `<div class="service">
          <div class="service-name">${s.name}</div>
          <span class="status ${st}"><span class="dot"></span>${st === 'up' ? 'Operational' : 'Outage'}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="bar-section">
      <div class="section-head">
        <div class="section-title">Last ${win.label}</div>
        <div class="section-sub">1 bar per ${CHECK_INTERVAL_MIN} min</div>
      </div>
      <div class="tabs">
        ${WINDOWS.map(w =>
          `<button class="tab ${w.key === activeWindow ? 'active' : ''}" onclick="setWindow('${w.key}')">${w.label}</button>`
        ).join('')}
      </div>
      ${SVCS.map(s => {
        const tk = ticks[s.key]?.[win.key] || [];
        const u = uptime[s.key]?.[win.key] ?? null;
        const filled = tk.filter(t => t !== 'empty').length;
        const coverage = tk.length ? Math.round((filled / tk.length) * 100) : 0;
        const coverageNote = coverage < 80 ? ` <span style="font-size:0.65rem;color:var(--text-3)">(${coverage}% coverage)</span>` : '';
        return `<div class="bar-row">
          <div class="bar-label">
            <span class="bar-name">${s.name}</span>
            <span class="bar-pct ${pctCls(u)}">${pctStr(u)}${coverageNote}</span>
          </div>
          <div class="bar">${tk.map(t => `<div class="t ${t}"></div>`).join('')}</div>
        </div>`;
      }).join('')}
      <div class="bar-range"><span>${win.label} ago</span><span>now</span></div>
    </div>

    <div class="uptime-section">
      <div class="section-head">
        <div class="section-title">Uptime</div>
      </div>
      <table class="uptime-table">
        <thead><tr>
          <th></th>${WINDOWS.map(w => `<th>${w.label}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${SVCS.map(s => `<tr>
            <td>${s.name}</td>
            ${WINDOWS.map(w => {
              const u = uptime[s.key]?.[w.key] ?? null;
              return `<td class="${pctCls(u)}">${pctStr(u)}</td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="latency-section">
      <div class="section-head">
        <div class="section-title">Response time</div>
        <div class="section-sub">90d window</div>
      </div>
      <p class="latency-note">Checks about every ${CHECK_INTERVAL_MIN} min from one GitHub Actions runner. Latency is a trend, not a benchmark.</p>
      <table class="uptime-table">
        <thead><tr>
          <th></th><th>p50</th><th>p95</th><th>p99</th>
        </tr></thead>
        <tbody>
          ${SVCS.map(s => {
            const l = latency[s.key] || {};
            return `<tr>
              <td>${s.name}</td>
              <td>${fmtMs(l.p50)}</td>
              <td>${fmtMs(l.p95)}</td>
              <td>${fmtMs(l.p99)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="incidents-section">
      <div class="section-head">
        <div class="section-title">Incidents</div>
        <div class="section-sub">90d window</div>
      </div>
      ${incidents.length === 0
        ? `<div class="no-incidents">No incidents in the last 90d.</div>`
        : incidents.map(inc => {
            const svc = SVCS.find(s => s.key === inc.service);
            const dur = fmtDuration(inc.lastSeen - inc.start);
            return `<div class="incident">
              <div class="incident-dot"></div>
              <div class="incident-body">
                <div class="incident-svc">${svc?.name || inc.service}</div>
                <div class="incident-meta">${fmtTime(inc.start)}${inc.count > 1 ? ` \u00b7 ${dur} \u00b7 ${inc.count} failed checks` : ''}</div>
                <div class="incident-err">${inc.error || 'Unknown error'}</div>
              </div>
            </div>`;
          }).join('')
      }
    </div>

    <footer>Last checked ${lastStr}</footer>`;
}

function setWindow(key) {
  activeWindow = key;
  render();
}

async function load() {
  try {
    allData = await fetchSummary();
    render();
    document.querySelector('.ink-blob')?.classList.add('visible');
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

load();
setInterval(load, 60000);
</script>
<script data-goatcounter="https://lokashrinav.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
