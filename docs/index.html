<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinker Status - Uptime Monitor for Tinker API by Thinking Machines Lab</title>
<meta name="description" content="Independent uptime monitor for the Tinker training API by Thinking Machines Lab. Tracks API reachability, inference, OpenAI-compatible endpoint, and training infrastructure status.">
<meta property="og:title" content="Tinker Status">
<meta property="og:description" content="Is Tinker down? Independent uptime and status page for the Tinker ML training API.">
<meta property="og:url" content="https://lokashrinav.github.io/tinker-status/">
<meta property="og:type" content="website">
<meta name="keywords" content="Tinker, Thinking Machines Lab, Tinker API, Tinker status, Tinker uptime, Tinker down, ML training API status">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="shortcut icon" href="./favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-2: #555;
    --text-3: #999;
    --border: #e8e8e8;
    --green: #2da44e;
    --red: #cf222e;
    --yellow: #bf8700;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .ink-blob {
    position: absolute;
    top: -550px;
    left: -550px;
    width: 1100px;
    height: 1100px;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition: none;
  }

  .ink-blob.visible { opacity: 1; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 24px 100px;
  }

  header { margin-bottom: 64px; }

  h1 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .overall {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .overall .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
  }
  .overall .dot.degraded { background: var(--yellow); }
  .overall .dot.down { background: var(--red); }

  .overall .ts {
    margin-left: auto;
    color: var(--text-3);
  }

  /* ── Services ── */
  .services { margin-bottom: 64px; }

  .service {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
  }
  .service:first-child { border-top: 1px solid var(--border); }

  .service-name { font-size: 0.92rem; font-weight: 500; }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
  }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; }
  .status.up { color: var(--green); }
  .status.up .dot { background: var(--green); }
  .status.down { color: var(--red); }
  .status.down .dot { background: var(--red); }

  /* ── Section headers ── */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
  }

  .section-sub {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
  }

  /* ── Uptime table ── */
  .uptime-section { margin-bottom: 64px; }

  .uptime-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  .uptime-table th {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--text-3);
    text-align: right;
    padding: 0 0 10px 16px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .uptime-table th:first-child { text-align: left; padding-left: 0; }

  .uptime-table td {
    padding: 12px 0 12px 16px;
    text-align: right;
    font-family: var(--mono);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  .uptime-table td:first-child {
    text-align: left;
    font-family: var(--sans);
    font-weight: 500;
    padding-left: 0;
  }

  .uptime-table .good { color: var(--green); }
  .uptime-table .warn { color: var(--yellow); }
  .uptime-table .bad { color: var(--red); }
  .uptime-table .na { color: var(--text-3); }

  /* ── Uptime bar ── */
  .bar-section { margin-bottom: 64px; }

  .bar-row { margin-bottom: 20px; }

  .bar-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .bar-name { font-size: 0.82rem; font-weight: 500; }

  .bar-pct { font-family: var(--mono); font-size: 0.78rem; }
  .bar-pct.good { color: var(--green); }
  .bar-pct.warn { color: var(--yellow); }
  .bar-pct.bad { color: var(--red); }

  .bar {
    display: flex;
    gap: 1.5px;
    height: 24px;
  }

  .bar .t {
    flex: 1;
    border-radius: 2px;
    transition: opacity 0.15s;
  }
  .bar .t.up { background: var(--green); opacity: 0.35; }
  .bar .t.up:hover { opacity: 0.7; }
  .bar .t.down { background: var(--red); opacity: 0.7; }
  .bar .t.down:hover { opacity: 1; }
  .bar .t.empty { background: #f0f0f0; }

  .bar-range {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-3);
  }

  /* ── Latency table ── */
  .latency-section { margin-bottom: 64px; }

  .latency-note {
    font-size: 0.75rem;
    color: var(--text-3);
    margin-top: -12px;
    margin-bottom: 20px;
  }

  /* ── Incidents ── */
  .incidents-section { margin-bottom: 0; }

  .incident {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .incident:first-child { border-top: 1px solid var(--border); }

  .incident-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    position: relative;
    top: 2px;
  }

  .incident-body { flex: 1; min-width: 0; }
  .incident-svc { font-weight: 500; }

  .incident-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
  }

  .incident-err {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .incident-time {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-3);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .no-incidents {
    padding: 28px 0;
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-3);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  footer {
    margin-top: 56px;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-3);
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 120px 0;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--text-3);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border);
    border-top-color: var(--text-3);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── Window tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
  }

  .tab {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-3);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:first-child { border-radius: 6px 0 0 6px; }
  .tab:last-child { border-radius: 0 6px 6px 0; }
  .tab + .tab { border-left: none; }

  .tab.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .tab:hover:not(.active) { color: var(--text); }

  @media (max-width: 600px) {
    .ink-blob { display: none; }
    .container { padding: 48px 16px 64px; }
    h1 { font-size: 1.6rem; }
    .service { flex-wrap: wrap; gap: 8px; }
    .uptime-table { font-size: 0.75rem; }
    .uptime-table th, .uptime-table td { padding-left: 10px; }
    .incident { flex-wrap: wrap; }
    .overall { flex-wrap: wrap; }
    .overall .ts { margin-left: 0; width: 100%; }
  }
</style>
</head>

<div class="container">
  <div id="app">

      <div class="spinner"></div>
      fetching status
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://fbtndmrbruifjdeaydjh.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidG5kbXJicnVpZmpkZWF5ZGpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODQzOTUsImV4cCI6MjA5MTg2MDM5NX0.n2tlq1Vbq4RqVKVHLHCY_OykV5Sq3bCP_GOxrUKHvu8';

const SVCS = [
  { key: 'reachability', name: 'API' },
  { key: 'sampling', name: 'Inference' },
  { key: 'openai_compatible', name: 'OpenAI-Compatible API' },
  { key: 'training_infra', name: 'Training' },
];

const WINDOWS = [
  { key: '24h', label: '24h', hours: 24 },
  { key: '7d',  label: '7d',  hours: 168 },
  { key: '30d', label: '30d', hours: 720 },
  { key: '90d', label: '90d', hours: 2160 },
];

const TICKS = 24;
let allData = null;
let activeWindow = '90d';

async function q(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
  });
  return r.json();
}

async function fetchAll() {
  const since = new Date(Date.now() - 90 * 24 * 3600 * 1000).toISOString();
  const [rows, latest] = await Promise.all([
    q(`check_results?checked_at=gte.${since}&order=checked_at.asc&select=service,status,latency_ms,checked_at,error`),
    q('check_results?order=checked_at.desc,service&limit=100'),
  ]);

  const latestMap = {};
  for (const r of latest) { if (!latestMap[r.service]) latestMap[r.service] = r; }

  return { rows, latest: latestMap };
}

function filterByWindow(rows, hours) {
  const cutoff = Date.now() - hours * 3600 * 1000;
  return rows.filter(r => new Date(r.checked_at).getTime() >= cutoff);
}

function calcUptime(rows, key, windowHours) {
  const s = rows.filter(r => r.service === key);
  if (!s.length) return null;
  if (windowHours) {
    const earliest = new Date(s[0].checked_at).getTime();
    const span = Date.now() - earliest;
    const windowMs = windowHours * 3600 * 1000;
    if (span < windowMs * 0.5) return null;
  }
  return (s.filter(r => r.status === 'up').length / s.length) * 100;
}

function pctStr(p) { return p === null ? '\u2014' : p.toFixed(2) + '%'; }
function pctCls(p) { return p === null ? 'na' : p >= 99.5 ? 'good' : p >= 95 ? 'warn' : 'bad'; }

function percentile(arr, p) {
  if (!arr.length) return null;
  const sorted = [...arr].sort((a, b) => a - b);
  const i = Math.ceil((p / 100) * sorted.length) - 1;
  return sorted[Math.max(0, i)];
}

function fmtMs(ms) {
  if (ms === null) return '\u2014';
  if (ms < 1000) return Math.round(ms) + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}

function calcLatency(rows, key, windowHours) {
  const svc = rows.filter(r => r.service === key && r.latency_ms != null);
  if (windowHours && svc.length) {
    const earliest = new Date(svc[0].checked_at).getTime();
    const span = Date.now() - earliest;
    if (span < windowHours * 3600 * 1000 * 0.5) return { p50: null, p95: null, p99: null };
  }
  const vals = svc.map(r => r.latency_ms);
  return {
    p50: percentile(vals, 50),
    p95: percentile(vals, 95),
    p99: percentile(vals, 99),
  };
}

function buildTicks(rows24h, key) {
  const svc = rows24h.filter(r => r.service === key);
  if (!svc.length) return Array(TICKS).fill('empty');
  const now = Date.now(), start = now - 24 * 3600 * 1000, bkt = (now - start) / TICKS;
  const t = Array(TICKS).fill('empty');
  for (const r of svc) {
    const i = Math.min(Math.floor((new Date(r.checked_at).getTime() - start) / bkt), TICKS - 1);
    if (i < 0) continue;
    if (t[i] === 'empty' || r.status === 'down') t[i] = r.status;
  }
  return t;
}

function buildIncidents(rows, hours) {
  const filtered = filterByWindow(rows, hours).filter(r => r.status === 'down');
  const incidents = [];
  let current = null;

  for (const r of filtered) {
    const t = new Date(r.checked_at).getTime();
    if (current && current.service === r.service && t - current.lastSeen < 25 * 60 * 1000) {
      current.lastSeen = t;
      current.count++;
    } else {
      if (current) incidents.push(current);
      current = {
        service: r.service,
        error: r.error,
        start: t,
        lastSeen: t,
        count: 1,
      };
    }
  }
  if (current) incidents.push(current);
  return incidents.reverse();
}

function fmtDuration(ms) {
  const m = Math.round(ms / 60000);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function render() {
  if (!allData) return;
  const { rows, latest } = allData;
  const win = WINDOWS.find(w => w.key === activeWindow);
  const winRows = filterByWindow(rows, win.hours);
  const rows24h = filterByWindow(rows, 24);

  const sts = SVCS.map(s => latest[s.key]?.status);
  const allUp = sts.every(s => s === 'up');
  const allDown = sts.every(s => s === 'down' || !s);
  const oTxt = allUp ? 'All systems operational' : allDown ? 'Major outage' : 'Experiencing issues';
  const oCls = allUp ? '' : allDown ? 'down' : 'degraded';

  const lastCheck = latest[SVCS[0].key]?.checked_at;
  const lastStr = lastCheck ? fmtTime(lastCheck) : '\u2014';

  const incidents = buildIncidents(rows, win.hours);

  document.getElementById('app').innerHTML = `
    <header>
      <h1>Tinker Status</h1>
      <div class="overall">
        <div class="dot ${oCls}"></div>${oTxt}
        <span class="ts">Last checked ${lastStr}</span>
      </div>
    </header>

    <div class="services">
      ${SVCS.map(s => {
        const d = latest[s.key], st = d?.status || 'down';
        return `<div class="service">
          <div class="service-name">${s.name}</div>
          <span class="status ${st}"><span class="dot"></span>${st === 'up' ? 'Operational' : 'Outage'}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="bar-section">
      <div class="section-head">
        <div class="section-title">Last 24 hours</div>
        <div class="section-sub">1 bar per hour</div>
      </div>
      ${SVCS.map(s => {
        const tk = buildTicks(rows24h, s.key);
        const u = calcUptime(rows24h, s.key, 24);
        return `<div class="bar-row">
          <div class="bar-label">
            <span class="bar-name">${s.name}</span>
            <span class="bar-pct ${pctCls(u)}">${pctStr(u)}</span>
          </div>
          <div class="bar">${tk.map(t => `<div class="t ${t}"></div>`).join('')}</div>
        </div>`;
      }).join('')}
      <div class="bar-range"><span>24h ago</span><span>now</span></div>
    </div>

    <div class="uptime-section">
      <div class="section-head">
        <div class="section-title">Uptime</div>
      </div>
      <table class="uptime-table">
        <thead><tr>
          <th></th>${WINDOWS.map(w => `<th>${w.label}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${SVCS.map(s => `<tr>
            <td>${s.name}</td>
            ${WINDOWS.map(w => {
              const u = calcUptime(filterByWindow(rows, w.hours), s.key, w.hours);
              return `<td class="${pctCls(u)}">${pctStr(u)}</td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="latency-section">
      <div class="section-head">
        <div class="section-title">Response time</div>
        <div class="section-sub">${win.label} window</div>
      </div>
      <p class="latency-note">Measured from a single GitHub Actions runner. Useful as a trend, not an absolute benchmark.</p>
      <div class="tabs">
        ${WINDOWS.map(w =>
          `<button class="tab ${w.key === activeWindow ? 'active' : ''}" onclick="setWindow('${w.key}')">${w.label}</button>`
        ).join('')}
      </div>
      <table class="uptime-table">
        <thead><tr>
          <th></th><th>p50</th><th>p95</th><th>p99</th>
        </tr></thead>
        <tbody>
          ${SVCS.map(s => {
            const l = calcLatency(winRows, s.key, win.hours);
            return `<tr>
              <td>${s.name}</td>
              <td>${fmtMs(l.p50)}</td>
              <td>${fmtMs(l.p95)}</td>
              <td>${fmtMs(l.p99)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="incidents-section">
      <div class="section-head">
        <div class="section-title">Incidents</div>
        <div class="section-sub">${win.label} window</div>
      </div>
      ${incidents.length === 0
        ? `<div class="no-incidents">No incidents in the last ${win.label}.</div>`
        : incidents.map(inc => {
            const svc = SVCS.find(s => s.key === inc.service);
            const dur = fmtDuration(inc.lastSeen - inc.start);
            return `<div class="incident">
              <div class="incident-dot"></div>
              <div class="incident-body">
                <div class="incident-svc">${svc?.name || inc.service}</div>
                <div class="incident-meta">${fmtTime(inc.start)}${inc.count > 1 ? ` \u00b7 ${dur} \u00b7 ${inc.count} failed checks` : ''}</div>
                <div class="incident-err">${inc.error || 'Unknown error'}</div>
              </div>
            </div>`;
          }).join('')
      }
    </div>

    <footer>Last checked ${lastStr}</footer>`;
}

function setWindow(key) {
  activeWindow = key;
  render();
}

async function load() {
  try {
    allData = await fetchAll();
    render();
    document.querySelector('.ink-blob')?.classList.add('visible');
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

load();
setInterval(load, 60000);
</script>
